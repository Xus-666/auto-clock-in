name: 🛠️ 构建 Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            openjdk-17-jdk ant unzip wget curl zip \
            libssl-dev zlib1g-dev libbz2-dev libreadline-dev \
            libsqlite3-dev libncurses5-dev libncursesw5-dev \
            libffi-dev liblzma-dev python3-dev \
            python3-pip python3-setuptools python3-wheel

      - name: ☕ 设置 JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: 📱 下载并配置 Android SDK（自动接受协议）
        run: |
          export ANDROID_HOME=/home/runner/android-sdk
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools

          # 下载 command line tools
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          unzip -q cmdline.zip && mv cmdline-tools latest && rm cmdline.zip

          # 写入 license 文件
          mkdir -p $ANDROID_HOME/licenses
          echo -e "\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo -e "\n84831b9409646a918e30573bab4c9c91346d8abd" > $ANDROID_HOME/licenses/android-sdk-preview-license

          # 安装 SDK 组件（明确指定 sdk_root）
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            --sdk_root=$ANDROID_HOME \
            "platform-tools" "platforms;android-34" "build-tools;34.0.0"

          # 确认 build-tools 存在
          ls $ANDROID_HOME/build-tools/

          # 让后续 steps 也能找到这套 SDK
          echo "ANDROID_HOME=/home/runner/android-sdk" >> $GITHUB_ENV
          echo "ANDROIDSDK=/home/runner/android-sdk" >> $GITHUB_ENV

      - name: 🐍 安装 Python 依赖
        run: |
          pip install --upgrade pip setuptools wheel
          pip install kivy==2.2.0 requests buildozer cython

      - name: 🔨 构建 APK（buildozer 自动下载 NDK）
        env:
          ANDROID_HOME: /home/runner/android-sdk
          ANDROIDSDK: /home/runner/android-sdk
        run: |
          ls $ANDROID_HOME/build-tools/
          buildozer android debug
          ls -lh .buildozer/bin/

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动打卡工具-APK
          path: .buildozer/bin/*.apk
          retention-days: 30
