name: 🛠️ 构建 Android APK

on:
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🐍 安装 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 安装系统依赖
        run: |
          sudo apt update
          sudo apt install -y --no-install-recommends \
            openjdk-17-jdk \
            ant \
            unzip \
            wget \
            curl \
            zip \
            libpq-dev \
            git \
            build-essential \
            libssl-dev \
            zlib1g-dev \
            libbz2-dev \
            libreadline-dev \
            libsqlite3-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libffi-dev \
            liblzma-dev \
            python3-dev \
            python3-pip \
            python3-setuptools \
            python3-wheel

      - name: ☕ 设置 JAVA_HOME
        run: |
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          echo "$JAVA_HOME/bin" >> $GITHUB_PATH

      - name: 📱 下载并配置 Android SDK
        run: |
          mkdir -p $HOME/android-sdk/cmdline-tools
          cd $HOME/android-sdk/cmdline-tools

          # 下载 command line tools
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip
          unzip -q cmdline.zip
          mv cmdline-tools latest
          rm cmdline.zip

          echo "ANDROID_HOME=$HOME/android-sdk" >> $GITHUB_ENV
          echo "$HOME/android-sdk/cmdline-tools/latest/bin:$HOME/android-sdk/platform-tools" >> $GITHUB_PATH

      - name: 📥 安装 Android SDK 组件
        run: |
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses > /dev/null 2>&1 || true
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platform-tools" \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "ndk;25b"

      - name: 🐍 安装 Python 依赖
        run: |
          pip install --upgrade pip setuptools wheel
          pip install kivy==2.2.0 requests buildozer

      - name: 🔨 构建 APK (debug)
        run: |
          buildozer android debug
          ls -lh .buildozer/bin/

      - name: 📤 上传 APK
        uses: actions/upload-artifact@v4
        with:
          name: 自动打卡工具-APK
          path: .buildozer/bin/*.apk
          retention-days: 30
